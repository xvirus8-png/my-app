<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بطاقة زبون</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
body{font-family:system-ui;background:#f5f7fa;padding:15px}
input,select,button{width:100%;padding:10px;margin:6px 0;border-radius:10px;border:1px solid #ddd}
button{background:#0d6efd;color:#fff;font-weight:bold}
</style>
</head>

<body>

<h2>بطاقة زبون</h2>

<input id="customerName" placeholder="اسم الزبون">
<input id="customerNumber" placeholder="رقم الزبون">

<select id="delegateSelect">
<option value="">المندوب (اختياري)</option>
</select>

<select id="discountSelect">
<option value="">الخصم (اختياري)</option>
</select>

<button onclick="setBrand('FOREVER')">FOREVER</button>
<button onclick="setBrand('CHARACTER')">CHARACTER</button>

<br><br>
<button id="saveBtn" onclick="saveCustomerCard()">حفظ</button>

<div id="status"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp({
  databaseURL: "https://kashf-system-default-rtdb.firebaseio.com"
});
const db = getDatabase(app);

let selectedBrand = "";
let currentRequestId = null;

function setBrand(b){
  selectedBrand = b;
}

async function sendRequest(payload){
  const id = Date.now();
  await set(ref(db,"requests/customerCard/latest"),{
    id:id,
    status:"new",
    ...payload
  });
  return id;
}

function watchStatus(id){
  onValue(ref(db,"requests/customerCard/latest"),snap=>{
    if(!snap.exists()) return;
    const data = snap.val();
    if(data.id != id) return;

    document.getElementById("status").innerText = data.status;

    if(data.status=="done"){
      alert("تم الحفظ");
    }

    if(data.status=="error"){
      alert("خطأ");
    }
  });
}

async function saveCustomerCard(){

  const name = document.getElementById("customerName").value.trim();

  if(!name){
    alert("اكتب اسم الزبون");
    return;
  }

  if(!selectedBrand){
    alert("اختر براند");
    return;
  }

  const payload = {
    name:name,
    number:document.getElementById("customerNumber").value || "",
    delegate:document.getElementById("delegateSelect").value || "",
    discount:document.getElementById("discountSelect").value || "",
    brand:selectedBrand,
    time:Date.now()
  };

  const id = await sendRequest(payload);
  currentRequestId = id;

  watchStatus(id);
}

window.saveCustomerCard = saveCustomerCard;
window.setBrand = setBrand;

</script>

</body>
</html>
