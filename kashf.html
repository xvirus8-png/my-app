<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Drive</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body{margin:0;font-family:system-ui;background:#f5f7fa;}
.top-bar{display:flex;align-items:center;gap:10px;padding:15px;}
.back-btn{width:45px;height:45px;border:none;border-radius:12px;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.08);cursor:pointer;}
.title{font-weight:800;font-size:16px;}
.search-box{padding:0 15px 10px;}
.search-box input{width:100%;padding:14px 16px;border-radius:16px;border:1.5px solid #dbe4ff;background:linear-gradient(135deg,#f8fbff,#eef4ff);font-size:16px;outline:none;box-sizing:border-box;}
.search-actions{display:flex;gap:8px;flex-wrap:wrap;padding:0 15px 10px;}
.mini-btn{
  border:none;border-radius:12px;padding:10px 14px;font-weight:800;font-size:16px;
  background:#eef1f5;cursor:pointer;color:#222;
}
.mini-btn.primary{background:#0d6efd;color:#fff;}
.mini-btn.danger{background:#fbe7e7;color:#b42318;}
.list{padding:15px;max-height:48vh;overflow:auto;}
.item{background:#fff;padding:12px;border-radius:14px;margin-bottom:8px;border:1px solid #edf2ff;display:flex;align-items:center;gap:10px;}
.checkbox{width:20px;height:20px;}
.info{flex:1;}
.size{font-size:12px;color:#6e7b96;}
.bulk-send-bar{position:fixed;left:0;right:0;bottom:0;background:#fff;padding:14px 15px 18px;box-shadow:0 -6px 18px rgba(0,0,0,.06);}
.bottom-buttons{display:flex;gap:14px;}
.bottom-btn{
  flex:1;
  height:55px;
  border:none;
  border-radius:30px;
  font-weight:800;
  font-size:16px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}
.send-btn{
  background:#3b6ee8;
  color:#fff;
  box-shadow:0 10px 24px rgba(59,110,232,.28);
}
.delete-btn{
  background:#f7f8fc;
  color:#3b6ee8;
  border:2px solid #d7def7;
}
body{
  overflow:hidden;
  touch-action: manipulation;
}
.list{
  overflow:auto;
  height:calc(100vh - 265px);
}
.drive-status{
  margin:0 15px 10px;
  background:#fff;
  padding:10px 12px;
  border-radius:12px;
  border:1px solid #edf2ff;
  color:#6e7b96;
  font-size:13px;
}
</style>
</head>

<body>

<div class="top-bar">
  <button class="back-btn" onclick="goBack()"><i class="bi bi-arrow-right"></i></button>
  <div class="title">Google Drive</div>
</div>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="بحث عن ملف">
</div>

<div class="search-actions">
  <button class="mini-btn primary" onclick="startSelectMode()">تحديد</button>
  <button class="mini-btn" onclick="selectAll()">تحديد الكل</button>
  <button class="mini-btn" onclick="clearAll()">إلغاء التحديد</button>
  <button class="mini-btn danger" onclick="endSelectMode()">إنهاء</button>
  <button class="mini-btn" onclick="refreshFiles()">🔄 تحديث الملفات</button>
</div>

<div class="drive-status" id="driveStatus">Google Drive غير متصل</div>

<div class="list" id="fileList"></div>

<div class="bulk-send-bar">
  <div class="bottom-buttons">
    <button class="bottom-btn delete-btn" onclick="deleteSelected()">حذف الملفات 🗑️</button>
    <button class="bottom-btn send-btn" onclick="sendSelected()">إرسال المحددين (<span id="count">0</span>)</button>
  </div>
</div>

<script>
const CLIENT_ID = "503826285883-45mi9qcd6vldrkbanu6me6fpqg5dghqs.apps.googleusercontent.com";
const API_KEY = "AIzaSyDwMM73FaT5snh18bs1WEE1A5pnXlGaD1M";
const FOLDER_ID = "1o_bPDqaTYQ3uU-fwvZbttJJdRzKCs4Os";
const DISCOVERY_DOC = "https://www.googleapis.com/discovery/v1/apis/drive/v3/rest";
const SCOPES = "https://www.googleapis.com/auth/drive.readonly";

let files = [
  {name:"فاتورة 123.pdf", size:"2.1 MB"},
  {name:"كشف حساب.xlsx", size:"1.4 MB"},
  {name:"صورة.jpeg", size:"800 KB"}
];

let selected = new Set();
let selectionMode = false;
let tokenClient = null;
let gapiInited = false;
let gisInited = false;

function setDriveStatus(text){
  const el = document.getElementById("driveStatus");
  if(el) el.textContent = text;
}

function initGoogleDrive(){
  setDriveStatus("جاري تهيئة Google Drive...");
  gapi.load("client", async () => {
    try{
      await gapi.client.init({
        apiKey: API_KEY,
        discoveryDocs: [DISCOVERY_DOC]
      });
      gapiInited = true;
      maybeEnableDrive();
    }catch(e){
      console.error(e);
      setDriveStatus("فشل تهيئة Google Drive");
    }
  });

  const waitGIS = setInterval(() => {
    if(window.google && google.accounts && google.accounts.oauth2){
      clearInterval(waitGIS);
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: async (resp) => {
          if(resp.error){
            setDriveStatus("فشل تسجيل الدخول إلى Google Drive");
            return;
          }
          await loadDriveFiles();
        }
      });
      gisInited = true;
      maybeEnableDrive();
    }
  }, 200);
}

function maybeEnableDrive(){
  if(gapiInited && gisInited){
    setDriveStatus("جاهز. اضغط تحديث الملفات.");
  }
}

async function ensureDriveAuth(){
  if(!gapiInited || !gisInited || !tokenClient){
    setDriveStatus("Google Drive بعده مو جاهز");
    return false;
  }

  const token = gapi.client.getToken();
  if(!token){
    return await new Promise((resolve) => {
      const oldCallback = tokenClient.callback;
      tokenClient.callback = async (resp) => {
        tokenClient.callback = oldCallback;
        if(resp.error){
          setDriveStatus("فشل تسجيل الدخول");
          resolve(false);
          return;
        }
        resolve(true);
      };
      tokenClient.requestAccessToken({ prompt: "consent" });
    });
  }
  return true;
}

function formatDriveSize(bytes){
  const n = Number(bytes || 0);
  if(!n) return "—";
  if(n < 1024) return n + " B";
  if(n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
  if(n < 1024 * 1024 * 1024) return (n / (1024 * 1024)).toFixed(1) + " MB";
  return (n / (1024 * 1024 * 1024)).toFixed(1) + " GB";
}

async function loadDriveFiles(){
  setDriveStatus("جاري تحميل الملفات...");
  try{
    const resp = await gapi.client.drive.files.list({
      q: `'${FOLDER_ID}' in parents and trashed = false`,
      pageSize: 100,
      fields: "files(id,name,size,mimeType,webViewLink,webContentLink)"
    });

    files = (resp.result.files || []).map(f => ({
      id: f.id,
      name: f.name || "بدون اسم",
      size: formatDriveSize(f.size),
      webViewLink: f.webViewLink || "",
      webContentLink: f.webContentLink || ""
    }));

    selected.clear();
    updateCount();
    render();
    setDriveStatus("تم تحميل " + files.length + " ملف");
  }catch(e){
    console.error(e);
    setDriveStatus("فشل تحميل ملفات Google Drive");
  }
}

function render(){
  const list = document.getElementById("fileList");
  const search = document.getElementById("searchInput").value.trim().toLowerCase();
  const filtered = files.filter(file => file.name.toLowerCase().includes(search));
  list.innerHTML = "";

  filtered.forEach((file) => {
    const i = files.findIndex(f => {
      if(file.id && f.id) return f.id === file.id;
      return f.name === file.name && f.size === file.size;
    });

    let checkbox = selectionMode
      ? `<input type="checkbox" class="checkbox" ${selected.has(i) ? "checked" : ""} onclick="event.stopPropagation()">`
      : "";

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      ${checkbox}
      <div class="info">
        <div>${file.name}</div>
        <div class="size">${file.size}</div>
      </div>
    `;

    div.onclick = () => {
      if(!selectionMode) return;
      if(selected.has(i)) selected.delete(i);
      else selected.add(i);
      updateCount();
      render();
    };

    const checkboxEl = div.querySelector(".checkbox");
    if(checkboxEl){
      checkboxEl.addEventListener("change", (e) => {
        e.stopPropagation();
        if(selected.has(i)) selected.delete(i);
        else selected.add(i);
        updateCount();
        render();
      });
    }

    list.appendChild(div);
  });
}

function startSelectMode(){ selectionMode = true; render(); }
function endSelectMode(){ selectionMode = false; selected.clear(); updateCount(); render(); }
function selectAll(){ files.forEach((_,i)=>selected.add(i)); updateCount(); render(); }
function clearAll(){ selected.clear(); updateCount(); render(); }
function updateCount(){ document.getElementById("count").textContent = selected.size; }

async function sendSelected(){
  const selectedItems = files.filter((_, i) => selected.has(i));

  if(selectedItems.length === 0){
    alert("ماكو ملفات محددة");
    return;
  }

  const message = "الملفات المحددة:%0A" + selectedItems.map(f => "- " + f.name).join("%0A");

  try{
    if(navigator.share){
      await navigator.share({
        title: "الملفات المحددة",
        text: selectedItems.map(f => "- " + f.name).join("\n")
      });
      return;
    }
  }catch(e){
    return;
  }

  window.location.href = "https://wa.me/?text=" + message;
}

function deleteSelected(){
  if(selected.size === 0){ alert("ماكو ملفات محددة للحذف"); return; }
  files = files.filter((_, i) => !selected.has(i));
  selected.clear();
  updateCount();
  render();
}

async function refreshFiles(){
  const ok = await ensureDriveAuth();
  if(!ok) return;
  await loadDriveFiles();
}

function goBack(){ window.location.href = "kashf.html"; }

document.getElementById("searchInput").addEventListener("input", render);
window.addEventListener("load", initGoogleDrive);

updateCount();
render();
</script>

</body>
</html>
