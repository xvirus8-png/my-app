<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الواجهة الرئيسية</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
body{
  overflow:hidden;
  background:linear-gradient(135deg,#e6f0ff,#f8fbff);
  font-family:system-ui;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.container{
  max-width:500px;
  width:100%;
  margin:auto;
  padding:20px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:20px;
  box-shadow:0 20px 40px rgba(0,0,0,.08);
}

.logo-card{
  width:150px;
  height:150px;
  margin:0 auto 18px;
  border-radius:24px;
  background:linear-gradient(135deg,#f8fbff,#eef4ff);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 10px 24px rgba(13,110,253,.10);
}

.logo-card img{
  width:120px;
  max-width:85%;
  animation:logoFloat 4s ease-in-out infinite;
}

.title{
  font-size:22px;
  font-weight:800;
  margin-bottom:20px;
  text-align:center;
}

.btn{
  width:100%;
  padding:16px 18px;
  border:none;
  border-radius:18px;
  font-size:16px;
  font-weight:800;
  margin-bottom:12px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  box-shadow:0 8px 18px rgba(0,0,0,.06);
  transition:background .18s ease, box-shadow .18s ease;
}

.btn-primary{
  background:linear-gradient(135deg,#0d6efd,#0b5ed7);
  color:#fff;
}

.btn-secondary{
  background:linear-gradient(135deg,#f8fbff,#eef4ff);
  color:#0d6efd;
  border:1px solid #dbe4ff;
}

@keyframes softPop{
  0%{transform:scale(1)}
  50%{transform:scale(.96)}
  100%{transform:scale(1)}
}

@keyframes logoFloat{
  0%,100%{transform:translateY(0)}
  20%{transform:translateY(-6px)}
  40%{transform:translateY(0)}
  60%{transform:translateY(-6px)}
  80%{transform:translateY(0)}
}

.btn:active{
  animation:softPop .25s ease;
}

/* smooth page transition */
body{
  opacity:1;
  transition:opacity .6s ease;
}
body.fade-out{
  opacity:0;
}


/* button click shake */
@keyframes btnShake{
  0%{transform:translateX(0)}
  25%{transform:translateX(-2px)}
  50%{transform:translateX(2px)}
  75%{transform:translateX(-2px)}
  100%{transform:translateX(0)}
}

.btn:active{
  animation:btnShake .3s ease;
}

</style>
</head>
