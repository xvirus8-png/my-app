<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الواجهة الرئيسية</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
body{
  background:#f5f7fa;
  font-family:system-ui;
}

.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:18px;
  box-shadow:0 8px 25px rgba(0,0,0,.06);
}

.title{
  font-size:22px;
  font-weight:800;
  margin-bottom:20px;
  text-align:center;
}

.btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  font-size:16px;
  font-weight:800;
  margin-bottom:12px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

.btn-primary{
  background:#0d6efd;
  color:#fff;
}

.btn-secondary{
  background:#eef4ff;
  color:#0d6efd;
}
</style>
</head>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="نظام المحاسبة">
<meta name="theme-color" content="#0d6efd">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<body>

<div class="container">
  <div class="card">
    
    <div class="title">اختيار القسم</div>

    <button class="btn btn-primary" onclick="goTo('kashf.html')">
      <i class="bi bi-receipt"></i>
      كشف حساب
    </button>

    <button class="btn btn-secondary" onclick="goTo('invoice.html')">
      <i class="bi bi-receipt-cutoff"></i>
      فاتورة بيع
    </button>

    <button class="btn btn-secondary" onclick="goTo('receipt.html')">
      <i class="bi bi-cash-stack"></i>
      إيصال قبض
    </button>

    <button class="btn btn-secondary" onclick="goTo('customer.html')">
      <i class="bi bi-person-badge"></i>
      بطاقة زبون
    </button>

    <button class="btn btn-secondary" onclick="goTo('calculator.html')">
      <i class="bi bi-calculator"></i>
      حاسبة
    </button>

  </div>
</div>

<script>
function goTo(page){
  window.location.href = page;
}
</script>

</body>
</html>
