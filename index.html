<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الواجهة الرئيسية</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
body{
  overflow:hidden;
  background:#f5f7fa;
  font-family:system-ui;
}

.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:18px;
  box-shadow:0 8px 25px rgba(0,0,0,.06);
}

.title{
  font-size:22px;
  font-weight:800;
  margin-bottom:20px;
  text-align:center;
}

.btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  font-size:16px;
  font-weight:800;
  margin-bottom:12px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

.btn-primary{
  background:#0d6efd;
  color:#fff;
}

.btn-secondary{
  background:#eef4ff;
  color:#0d6efd;
}

/* logo animation */
@keyframes fadeIn{
  from{opacity:0;transform:translateY(-10px);}
  to{opacity:1;transform:translateY(0);}
}

/* buttons upgrade safe */
.btn{
  padding:16px 18px;
  border-radius:16px;
  box-shadow:0 6px 15px rgba(0,0,0,.06);
  transition:transform .15s ease, box-shadow .15s ease;
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 25px rgba(13,110,253,.12);
}

.btn:active{
  transform:scale(.98);
}

.btn i{
  font-size:18px;
  transition:.2s;
}

.btn:hover i{
  transform:scale(1.1);
}

/* colors */
.btn-primary{
  background:linear-gradient(135deg,#0d6efd,#0b5ed7);
}

.btn-secondary{
  background:#f4f8ff;
  border:1px solid #dbe4ff;
}


/* full background */
body{
  overflow:hidden;
  background:linear-gradient(135deg,#e6f0ff,#f8fbff);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* card floating */
.card{
  position:relative;
  z-index:2;
  box-shadow:0 20px 40px rgba(0,0,0,.08);
  border-radius:20px;
}

/* container full center */
.container{
  width:100%;
  padding:20px;
}


/* Kashf style button animation */
@keyframes softPop{
  0%{transform:scale(1);}
  50%{transform:scale(.96);}
  100%{transform:scale(1);}
}

.btn{
  transition:.2s ease;
}

.btn:active{
  animation:softPop .25s ease;
}

.btn:hover{
  transform:translateY(-2px);
}

</style>
</head>
